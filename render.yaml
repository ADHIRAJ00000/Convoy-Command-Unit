services:
  - type: web
    name: hawkroute-backend
    env: node
    region: oregon
    plan: starter
    branch: main
    rootDir: Backend
    buildCommand: npm install
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: info
    healthCheckPath: /health
